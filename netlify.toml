[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

[context.production.environment]
  # Remplacez par l’URL publique de votre backend (doit se terminer par /api)
  VITE_API_URL = "https://votre-backend.exemple.com/api"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200